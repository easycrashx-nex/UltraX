<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UltraX Page Info</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080c14;
        color: #f5f7fb;
      }

      body {
        margin: 0;
        padding: 18px;
        background: linear-gradient(180deg, #101826, #060910 76%);
      }

      main {
        display: grid;
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      .card {
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.76);
        padding: 14px;
      }

      .label {
        display: block;
        margin-bottom: 6px;
        color: #8d98aa;
        font-size: 11px;
        text-transform: uppercase;
      }

      .value {
        overflow-wrap: anywhere;
        font-size: 13px;
        line-height: 1.55;
      }

      button {
        height: 34px;
        justify-self: start;
        border: 1px solid rgba(88, 146, 255, 0.55);
        border-radius: 10px;
        background: rgba(45, 100, 255, 0.92);
        color: white;
        padding: 0 13px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      #status {
        margin: 0;
        color: #9ca6b8;
        font-size: 12px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page Info</h1>
      <section class="card">
        <span class="label">Active tab</span>
        <div id="title" class="value">Loading...</div>
      </section>
      <section class="card">
        <span class="label">URL</span>
        <div id="url" class="value">Loading...</div>
      </section>
      <section class="card">
        <span class="label">Open tabs</span>
        <div id="tab-count" class="value">0</div>
      </section>
      <button id="refresh" type="button">Refresh</button>
      <p id="status">Loading...</p>
    </main>
    <script src="index.js"></script>
  </body>
</html>
