name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows release package
        run: npm run release:win
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify updater metadata
        shell: pwsh
        run: |
          $appUpdate = "release/win-unpacked/resources/app-update.yml"
          if (!(Test-Path $appUpdate)) {
            throw "Missing app-update.yml in packaged app resources."
          }

          $appUpdateText = Get-Content $appUpdate -Raw
          foreach ($expected in @("provider: github", "owner: easycrashx-nex", "repo: UltraX")) {
            if (!$appUpdateText.Contains($expected)) {
              throw "app-update.yml does not contain '$expected'."
            }
          }

          if (!(Test-Path "release/latest.yml")) {
            throw "Missing latest.yml updater metadata."
          }

          $latestText = Get-Content "release/latest.yml" -Raw
          if ($latestText -notmatch "UltraX-Browser-Setup-.+-x64\.exe") {
            throw "latest.yml does not point to the Windows Setup installer."
          }

      - name: Create or update GitHub release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $notes = "UltraX Browser v$version`n`nSee CHANGELOG.md for release notes and update details."

          gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --title $version --notes $notes
          } else {
            gh release create $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $version --notes $notes
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure GitHub release assets
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $setup = "UltraX-Browser-Setup-$version-x64.exe"
          $setupBlockmap = "$setup.blockmap"
          $portable = "UltraX-Browser-$version-Portable-x64.exe"

          $assets = @()
          $assets += Get-Item "release/$setup" -ErrorAction Stop
          $assets += Get-Item "release/$setupBlockmap" -ErrorAction Stop
          $assets += Get-Item "release/$portable" -ErrorAction Stop
          $assets += Get-Item "release/latest.yml" -ErrorAction Stop
          $assets += Get-Item "release/$setup.sha256" -ErrorAction Stop
          $assets += Get-Item "release/$setupBlockmap.sha256" -ErrorAction Stop
          $assets += Get-Item "release/$portable.sha256" -ErrorAction Stop
          $assets += Get-Item "release/latest.yml.sha256" -ErrorAction Stop
          $assets += Get-Item "release/SHA256SUMS.txt" -ErrorAction Stop

          if ($assets.Count -lt 9) {
            throw "Expected installer, portable, blockmap, latest.yml, and checksum release assets."
          }

          foreach ($asset in $assets) {
            gh release upload $env:GITHUB_REF_NAME $asset.FullName --clobber
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ultrax-windows-release
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
            release/*.sha256
            release/SHA256SUMS.txt
          if-no-files-found: warn
