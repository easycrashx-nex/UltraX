name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Electron E2E tests
        run: npm run test:e2e

      - name: Build Windows release package
        run: npm run release:win
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify release assets and updater metadata
        shell: pwsh
        run: |
          npm run validate:release

      - name: Packaged security smoke test
        run: npm run test:e2e:packaged

      - name: Create or update GitHub release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $notes = @"
          UltraX Browser 1.1.10-DevU

          Silent in-app updates with automatic restart, preserving the existing UltraX browser experience.
          The internal package version is $version. Portable builds remain manual.
          "@

          gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --title "UltraX Browser 1.1.10-DevU" --notes $notes
          } else {
            gh release create $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title "UltraX Browser 1.1.10-DevU" --notes $notes
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure GitHub release assets
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v1.1.10") { throw "This release workflow is intentionally locked to v1.1.10." }
          $setup = "UltraX-Browser-Setup-$version-x64.exe"
          $portable = "UltraX-Browser-$version-Portable-x64.exe"
          $expected = @(
            $setup,
            "$setup.blockmap",
            "latest.yml",
            $portable,
            "$setup.sha256",
            "$portable.sha256",
            "SHA256SUMS.txt"
          )

          $assets = @()
          $assets += Get-Item "release/$setup" -ErrorAction Stop
          $assets += Get-Item "release/$setup.blockmap" -ErrorAction Stop
          $assets += Get-Item "release/latest.yml" -ErrorAction Stop
          $assets += Get-Item "release/$portable" -ErrorAction Stop
          $assets += Get-Item "release/$setup.sha256" -ErrorAction Stop
          $assets += Get-Item "release/$portable.sha256" -ErrorAction Stop
          $assets += Get-Item "release/SHA256SUMS.txt" -ErrorAction Stop

          if ($assets.Count -ne 7) {
            throw "Expected NSIS installer, blockmap, latest.yml, portable executable, and checksums."
          }

          $existing = gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name'
          foreach ($name in ($existing -split "`r?`n" | Where-Object { $_ -and ($_ -notin $expected) })) {
            gh release delete-asset $env:GITHUB_REF_NAME $name --repo $env:GITHUB_REPOSITORY --yes
          }

          foreach ($asset in $assets) {
            gh release upload $env:GITHUB_REF_NAME $asset.FullName --clobber
          }

          $published = gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name'
          $publishedNames = $published -split "`r?`n" | Where-Object { $_ }
          foreach ($name in $expected) {
            if ($name -notin $publishedNames) { throw "Release is missing published asset: $name" }
          }
          if (($publishedNames | Measure-Object).Count -ne $expected.Count) { throw "Release contains unexpected or duplicate asset names." }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ultrax-windows-release
          path: |
            release/*.exe
            release/*.sha256
            release/SHA256SUMS.txt
          if-no-files-found: warn
